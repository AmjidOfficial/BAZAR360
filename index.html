<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAZAR360 | Auto Choice Premium Division</title>
    
    <!-- SPA Deep Link Extraction Engine -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === 'p') {
          var pairs = l.search.slice(1).split('&');
          var query = {};
          pairs.forEach(function(pair) {
            var parts = pair.split('=');
            query[parts[0]] = parts.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (query.p !== undefined) {
            window.history.replaceState(null, null,
              l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
              '/' + query.p +
              (query.q ? ('?' + query.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
  </head>
  <body class="bg-[#070c18]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
